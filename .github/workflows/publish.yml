name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases
      id-token: write # Required for OIDC and provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Extract Release Notes
        id: extract_release_notes
        run: |
          # Extract the content between the first and second H2 (##) headers
          sed -n '/^## \[.*/,/^## \[.*/p' CHANGELOG.md | sed '1d;$d' > release_notes.md
          echo "NOTES_FILE=release_notes.md" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          body_path: release_notes.md
